<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Учим слоги с семьёй</title>
  <link rel="stylesheet" href="css/syllable-style.css">
</head>
<body>
<!-- Экран загрузки -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <h2>Загружаем волшебных помощников...</h2>
    <div class="loading-progress-bar">
      <div class="loading-progress-fill" id="loadingProgress"></div>
    </div>
    <p id="loadingStatus">0%</p>
    <div class="loading-characters-preview">
      <span>👶 👨 👩 👴 👵 🐱 🐕</span>
    </div>
  </div>
</div>

<!-- Основной игровой экран -->
<div class="game-wrapper" id="gameWrapper" style="opacity: 0;">
  <!-- Верхняя панель -->
  <header class="top-bar">
    <div class="rewards-bar">
      <div class="reward-item">
        <span class="reward-icon">🏆</span>
        <span id="score-display">0</span>
      </div>
      <div class="reward-item">
        <span class="reward-icon">⭐</span>
        <span id="stars-display">0</span>
      </div>
      <div class="reward-item">
        <span class="reward-icon">👑</span>
        <span id="crowns-display">0</span>
      </div>
    </div>
    <div class="controls-bar">
      <button class="control-button voice-toggle" id="voiceToggleBtn" title="Вкл/Выкл озвучку">
        <span class="control-icon" id="voiceIcon">🔊</span>
      </button>
      <button class="control-button auto-voice-toggle" id="autoVoiceToggleBtn" title="Автоозвучка">
        <span class="control-icon" id="autoVoiceIcon">🎤</span>
      </button>
      <button class="control-button reset-button" id="resetGameBtn" title="Начать сначала">
        <span class="control-icon">⟲</span>
      </button>
    </div>
  </header>

  <!-- Информационная панель -->
  <div class="info-panel">
    <div class="level-badge">Уровень <span id="current-level">1</span>/8</div>
    <div class="level-name-badge" id="level-name">Учим слоги</div>
  </div>

  <!-- Основной контент -->
  <div class="main-content">
    <!-- Режим обучения -->
    <div id="learningMode" class="learning-mode">
      <div class="syllable-card">
        <div class="syllable-display" id="current-syllable">...</div>
        <button id="speakSyllableBtn" class="speak-button">
          <span class="speak-icon">🔊</span>
        </button>
      </div>

      <div class="word-example">
        <div class="word-label">В слове:</div>
        <div class="word-highlight" id="word-highlight">...</div>
      </div>

      <div class="progress-info">
        Слог <span id="syllable-count">1/5</span>
      </div>

      <button id="nextSyllableBtn" class="next-syllable-btn">
        Следующий слог →
      </button>
    </div>

    <!-- Режим тестирования -->
    <div id="testingMode" class="testing-mode" style="display: none;">
      <div class="question-info">
        <div class="progress-badge">Вопросов: <span id="questions-progress">0/10</span></div>
        <div class="wrong-badge">Ошибок подряд: <span id="wrong-counter">0</span></div>
      </div>

      <div class="question-word" id="word-with-blank">
        <span class="word-part">...</span>
        <span class="word-part blank">___</span>
        <span class="word-part">...</span>
      </div>

      <div class="options-grid" id="optionsContainer">
        <button id="option1" class="option-btn">...</button>
        <button id="option2" class="option-btn">...</button>
        <button id="option3" class="option-btn">...</button>
        <button id="option4" class="option-btn">...</button>
      </div>

      <button id="repeatQuestionBtn" class="repeat-question-btn">
        <span class="speak-icon">🔊</span> Повторить вопрос
      </button>
    </div>
  </div>

  <!-- Область для сообщений -->
  <div class="message-area" id="game-message"></div>
</div>

<!-- Мотивационный персонаж -->
<div class="character-popup" id="characterPopup">
  <div class="character-avatar">
    <img src="" alt="" id="characterImage">
  </div>
  <div class="character-bubble" id="characterBubble"></div>
</div>

<!-- Модальное окно подтверждения сброса -->
<div class="modal-overlay" id="resetModal" style="display: none;">
  <div class="modal-content">
    <h3>Начать сначала?</h3>
    <p>Весь прогресс будет потерян. Вы уверены?</p>
    <div class="modal-buttons">
      <button class="modal-btn cancel-btn" id="cancelReset">Отмена</button>
      <button class="modal-btn confirm-btn" id="confirmReset">Начать сначала</button>
    </div>
  </div>
</div>

<!-- Скрипты - ВАЖЕН ПРАВИЛЬНЫЙ ПОРЯДОК -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<!-- Общие сервисы -->
<script src="../commonJs/coreVoiceService.js"></script>
<script src="../commonJs/baseVoiceService.js"></script>
<script src="../commonJs/resourceManager.js"></script>

<!-- Данные игры - ВАЖНО: сначала уровни, потом персонажи -->
<script src="js/syllableLevels.js"></script>
<script src="js/syllableData.js"></script>

<!-- Состояние игры -->
<script src="js/syllableGameState.js"></script>

<!-- Голосовой сервис (зависит от состояния) -->
<script src="js/syllableVoiceService.js"></script>

<!-- UI и персонажи -->
<script src="js/syllableUi.js"></script>
<script src="js/syllableCharacterManager.js"></script>

<!-- Логика игры (зависит от всего остального) -->
<script src="js/syllableGameLogic.js"></script>

<!-- Главный файл (последним) -->
<script src="js/syllableMain.js"></script>

<!-- Скрипт для инициализации AudioContext -->
<script>
  (function() {
    function initAudio() {
      if (typeof VoiceCore !== 'undefined' && VoiceCore._initAudioContext) {
        VoiceCore._initAudioContext();
      }
      document.removeEventListener('click', initAudio);
      document.removeEventListener('touchstart', initAudio);
    }
    document.addEventListener('click', initAudio);
    document.addEventListener('touchstart', initAudio);
  })();
</script>
</body>
</html>
